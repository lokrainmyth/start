<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Lo.Krain - Io</title>

  <link rel="stylesheet" href="./css/main.css">
</head>

<body>

<!-- ENTRY -->
<div id="entry" class="entry">
  <div class="entry-title">LO.KRAIN — IO</div>
  <div class="entry-sub">tap / click / enter</div>
</div>

<!-- APP -->
<div id="app" class="layout hidden">

  <div class="hero">

    <img class="album-cover" src="./cover.jpeg">

    <div class="title">Io</div>
    <div class="subtitle">LO.KRAIN</div>

    <div class="meta">
      Release June 21, 2026<br>
      Artist Lo.Krain
    </div>

    <div class="artist-block">
      <img class="artist-avatar" src="./artist.jpg">
      <div class="meta">Exile Sound Project</div>
    </div>

    <!-- PLAYER -->
    <div class="player">
      <button id="playBtn">PLAY</button>
      <button id="pauseBtn">PAUSE</button>
      <button id="skipBtn">SKIP</button>

      <div class="progress">
        <div id="progressBar"></div>
      </div>

      <div class="time">
        <span id="currentTime">00:00</span> / <span id="totalTime">00:00</span>
      </div>
    </div>

  </div>

  <div class="playlist" id="playlist"></div>

</div>

<audio id="audioEngine"></audio>

<script src="./js/storage.js"></script>
<script src="./js/player.js"></script>
<script src="./js/world.js"></script>
<script src="./js/intro.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
