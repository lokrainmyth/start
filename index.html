<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Lo.Krain - Io</title>

  <link rel="stylesheet" href="./css/main.css">
</head>

<body>

<!-- ===== ENTRY SCREEN ===== -->
<div id="entry" class="entry">
  <div class="entry-title">LO.KRAIN — IO</div>
  <div class="entry-sub">press enter</div>
</div>

<!-- ===== MAIN APP ===== -->
<div class="layout hidden" id="app">

  <!-- LEFT -->
  <div class="hero">

    <img class="album-cover" src="./cover.jpeg">

    <div class="title">Io</div>
    <div class="subtitle">LO.KRAIN</div>

    <div class="meta">
      Release June 21, 2026<br>
      Artist: Lo.Krain
    </div>

    <div class="artist-block">
      <img class="artist-avatar" src="./artist.jpg">
      <div class="meta">
        Lo.Krain<br>
        Exile Sound Project
      </div>
    </div>

    <!-- PLAYER -->
    <div class="player">

      <div class="controls">
        <button id="playBtn">PLAY</button>
        <button id="pauseBtn">PAUSE</button>
        <button id="skipBtn">SKIP</button>
      </div>

      <div class="progress">
        <div id="progressBar"></div>
      </div>

      <div class="time">
        <span id="currentTime">00:00</span> / <span id="totalTime">00:00</span>
      </div>

    </div>

  </div>

  <!-- RIGHT -->
  <div>
    <div class="playlist" id="playlist"></div>
  </div>

</div>

<audio id="audioEngine"></audio>

<script src="./js/storage.js"></script>
<script src="./js/player.js"></script>
<script src="./js/world.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
