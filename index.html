<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Io — Lo.Krain</title>

<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/animations.css">
<link rel="stylesheet" href="css/main.css">

</head>

<body>

<div class="page">

<!-- LANGUAGE -->
<div class="lang-switch">
    <span class="lang active">RU</span>
    <span class="lang">EN</span>
</div>

<!-- HERO -->
<section class="hero">

    <h1>Io</h1>

    <img class="cover" src="cover.jpeg">

    <div class="artist">
        <div class="artist-name">Lo.Krain</div>
        <div class="artist-role">ARTIST</div>
    </div>

    <div class="meta">
        <div>Release</div>
        <div>21 June 2026</div>
    </div>

    <p class="intro">
        Io is the final chapter of a 15-year journey through night to dawn.
        Listen from beginning to end.
        The path continues beyond the last track.
    </p>

</section>

<hr>
<!-- ALBUM IDENTITY -->
<section class="album-identity">

  <img class="album-cover" id="albumCover" src="./cover.jpeg" alt="Io Cover" />

  <div class="album-meta">
    <div class="artist-name">Lo.Krain</div>
    <div class="album-name">Io</div>
    <div class="album-date">21 June 2026</div>
  </div>

</section>
<!-- PLAYER -->
<section class="player">

<div id="now">01 — ПУТЬ</div>

<audio id="audio" src="01-put.mp3"></audio>

<div class="controls">
    <button id="play">Play</button>
    <button id="skip">Skip</button>
</div>

</section>

<hr>

<!-- TRACKLIST -->
<section id="tracks">

<div class="playlist" id="playlist"></div>

</section>

</div>

<script src="js/app.js"></script>

</body>
</html>
<section class="communication hidden" id="communication">

  <form id="contactForm" class="contact-form">

    <input type="text" name="name" placeholder="Name" required />
    <textarea name="message" placeholder="Message" required></textarea>

    <button type="submit">Send</button>

  </form>

</section>
<section class="myth-layer hidden" id="mythLayer">
  <div class="myth-title">Lo.Krain Myth</div>
  <div class="myth-question">Go Deeper?</div>
  <button class="btn myth-btn" id="mythEnter">ENTER</button>
</section>
