<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Lo.Krain - Io</title>

  <link rel="icon" href="./favicon-32x32.png"/>

  <link rel="stylesheet" href="./css/theme.css"/>
  <link rel="stylesheet" href="./css/animations.css"/>
  <link rel="stylesheet" href="./css/main.css"/>
  <link rel="stylesheet" href="./css/responsive.css"/>
</head>

<body class="state-night">

<!-- ABSTRACT BACKGROUND -->
<div class="bg"></div>
<div class="noise"></div>
<div class="light-field"></div>

<!-- HEADER -->
<header class="top">
  <div class="title">Lo.Krain — Io</div>
  <div class="state" id="state">NIGHT</div>
</header>

<main class="layout">

  <!-- LEFT: PLAYLIST -->
  <section class="left">

    <div id="playlist" class="playlist"></div>

  </section>

  <!-- RIGHT: CORE EXPERIENCE -->
  <section class="right">

    <!-- ORBIT COVER -->
    <div class="orbit">
      <img src="./cover.jpeg" class="cover" id="cover"/>
      <div class="orbit-ring"></div>
    </div>

    <!-- ARTIST -->
    <div class="artist">
      <img src="./artist.jpg" class="artist-img"/>
      <div class="artist-name">Lo.Krain</div>
      <div class="album-name">Io</div>
      <div class="album-date">21.06.2026</div>
    </div>

    <!-- PLAYER -->
    <div class="player">

      <div class="controls">
        <button id="play">PLAY</button>
        <button id="pause">PAUSE</button>
        <button id="skip">SKIP</button>
      </div>

      <div class="progress">
        <div id="bar"></div>
      </div>

      <div class="time">
        <span id="t1">00:00</span> / <span id="t2">00:00</span>
      </div>

      <div class="warning">
        путь запоминается — пропустить шаг?
      </div>

    </div>

  </section>

</main>

<!-- MYTH -->
<section id="myth" class="myth hidden">
  <div class="myth-title">Go Deeper?</div>
  <button id="enterMyth">ENTER</button>
</section>

<audio id="audio"></audio>

<script src="./js/storage.js"></script>
<script src="./js/player.js"></script>
<script src="./js/world.js"></script>
<script src="./js/app.js"></script>

</body>
</html>
